# ============================================
# 开发环境覆盖配置
# 使用: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================

services:
  frontend:
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE=http://localhost:${APP_PORT:-8000}/api/v1
    command: npm run dev

  backend:
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ../backend:/app
      - ../dataset:/app/dataset
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    environment:
      - DEBUG=true
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  neo4j:
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"

  milvus:
    ports:
      - "${MILVUS_HTTP_PORT:-9091}:9091"

  minio:
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  nginx:
    ports:
      - "${NGINX_PORT:-80}:80"

volumes:
  backend_uploads:
  backend_logs:
