version: "3.8"

services:
  # ============================================
  # Frontend — React + Vite + Three.js
  # ============================================
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: development
    environment:
      - VITE_API_BASE=${VITE_API_BASE:-http://localhost:8000/api/v1}
    networks:
      - qiwu-network

  # ============================================
  # Backend — FastAPI
  # ============================================
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-qiwu}
      - NEO4J_URI=bolt://neo4j:${NEO4J_BOLT_PORT:-7687}
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_AUTH#*/}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-qiwu-artifacts}
      - DEBUG=${APP_DEBUG:-false}
      - API_PREFIX=${API_PREFIX:-/api/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000"]}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - qiwu-network

  # ============================================
  # PostgreSQL 15
  # ============================================
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qiwu}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qiwu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-qiwu}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # Neo4j — Knowledge Graph
  # ============================================
  neo4j:
    image: neo4j:5.18-community
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/password}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - qiwu-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ============================================
  # Milvus — Vector Database
  # ============================================
  milvus:
    image: milvusdb/milvus:v2.4.4
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:${MINIO_API_PORT:-9000}
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    networks:
      - qiwu-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9091/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ============================================
  # etcd — Milvus coordinator
  # ============================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    volumes:
      - etcd_data:/etcd
    networks:
      - qiwu-network
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MinIO — Object Storage
  # ============================================
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - qiwu-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ============================================
  # Redis — Cache & Rate Limiting
  # ============================================
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - qiwu-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Nginx — Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - qiwu-network

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  milvus_data:
  etcd_data:
  minio_data:
  redis_data:

networks:
  qiwu-network:
    driver: bridge
