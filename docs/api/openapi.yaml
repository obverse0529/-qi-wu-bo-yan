## 知识图谱

### 查询文物图谱

```
GET /kg/artifacts/{artifact_id}?depth=2
```

**响应**:
```json
{
  "nodes": [
    {"id": "artifact_001", "label": "Artifact", "properties": {...}},
    {"id": "商", "label": "Dynasty", "properties": {...}}
  ],
  "edges": [
    {"source": "artifact_001", "target": "商", "type": "BELONGS_TO_DYNASTY"}
  ]
}
```

### 搜索相关文物

```
GET /kg/related/{artifact_id}?types=SIMILAR_TO,RELATED_TO&limit=10
```

### 关键词搜索

```
GET /kg/search?keyword=青铜鼎&limit=20
```

### 获取图谱统计

```
GET /kg/statistics
```

---

## RAG 检索

### 搜索相关文档

```
GET /rag/search?query=青铜鼎的铸造工艺&top_k=5
```

**响应**:
```json
{
  "results": [
    {
      "id": "doc-uuid",
      "artifact_id": "artifact_001",
      "content": "...",
      "source": "《文物》2020年第1期",
      "score": 0.85
    }
  ]
}
```

### 获取文物文档

```
GET /rag/artifacts/{artifact_id}/documents
```

### 获取集合统计

```
GET /rag/statistics
```

---

## 错误响应

所有错误返回标准HTTP状态码和JSON格式：

```json
{
  "detail": "错误描述信息"
}
```

### 常见状态码

| 状态码 | 说明 |
|--------|------|
| 200 | 成功 |
| 202 | 异步任务已接受 |
| 400 | 请求参数错误 |
| 404 | 资源不存在 |
| 500 | 服务器内部错误 |

---

## WebSocket (可选)

用于实时进度推送：

```
ws://localhost:8000/ws/tasks/{task_id}
```

推送消息格式：
```json
{
  "type": "progress",
  "data": {
    "progress": 50,
    "status": "running"
  }
}
```
