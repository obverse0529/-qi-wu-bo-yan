# 启物博言 DPO 训练配置
# 使用博物馆文物多源描述数据进行偏好优化
# 使用 Qwen2.5-0.5B 模型（已下载）

# 模型配置
model_name: "Qwen/Qwen2.5-0.5B"
local_model_path: "models/llm/qwen2.5-0.5b-hf"
ref_model_name: null

# LoRA 配置
use_lora: true
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# 数据配置 - 训练数据在 E:\博言\LLM训练
preference_data_path: "E:/博言/LLM训练/preferences.jsonl"

# DPO 参数
beta: 0.1
label_smoothing: 0.0

# 训练参数
epochs: 3
batch_size: 4
gradient_accumulation_steps: 2
learning_rate: 1.0e-5
warmup_ratio: 0.1
max_grad_norm: 1.0

# 硬件配置
device: "cuda"
dtype: "bf16"

# 输出配置
output_dir: "models/qwen2.5-0.5b-bo-yan-dpo"
log_dir: "models/qwen2.5-0.5b-bo-yan-dpo/logs"

# 随机种子
seed: 42
